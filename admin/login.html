<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Admin Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--color-cream);
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      background-color: var(--color-white);
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--color-border);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 25px;
    }
    .login-brand h1 {
      font-size: 2rem;
      margin-bottom: 5px;
    }
    .login-brand p {
      color: var(--color-neutral-gray);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-brand">
      <h1>Wedding Admin</h1>
      <p>Silakan masuk untuk mengelola konten undangan</p>
    </div>

    <form id="login-form">
      <input type="hidden" name="csrf_token" id="csrf-token-val">
      
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 10px;">
        Masuk
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
