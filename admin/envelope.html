<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Amplop Digital - Admin Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

  <div class="admin-layout">
    <!-- Header -->
    <header class="admin-header">
      <div style="display: flex; align-items: center;">
        <button id="sidebar-toggle-btn" class="admin-nav-toggle" aria-label="Toggle Sidebar">
          <i data-feather="menu"></i>
        </button>
        <span class="admin-header__brand">Wedding Admin</span>
      </div>
      <div class="admin-header__actions">
        <a href="../index.html" target="_blank" class="btn btn--outline btn--sm" style="color: var(--color-white); border-color: var(--color-gold);">
          <i data-feather="external-link"></i> Pratinjau
        </a>
        <button id="logout-btn" class="btn btn--danger btn--sm">
          <i data-feather="log-out"></i> Keluar
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <nav class="admin-nav">
        <a href="index.html" class="admin-nav__item"><i data-feather="grid"></i> Dashboard</a>
        <a href="couple.html" class="admin-nav__item"><i data-feather="users"></i> Mempelai</a>
        <a href="events.html" class="admin-nav__item"><i data-feather="calendar"></i> Acara</a>
        <a href="gallery.html" class="admin-nav__item"><i data-feather="image"></i> Galeri Foto</a>
        <a href="love-story.html" class="admin-nav__item"><i data-feather="heart"></i> Love Story</a>
        <a href="envelope.html" class="admin-nav__item"><i data-feather="credit-card"></i> Amplop Digital</a>
        <a href="rsvp.html" class="admin-nav__item"><i data-feather="mail"></i> RSVP Tamu</a>
        <a href="guestbook.html" class="admin-nav__item"><i data-feather="message-square"></i> Buku Tamu</a>
        <a href="music.html" class="admin-nav__item"><i data-feather="music"></i> Musik Latar</a>
        <a href="settings.html" class="admin-nav__item"><i data-feather="settings"></i> Pengaturan</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-page-header">
        <h2 class="admin-page-title">Kelola Amplop Digital / Rekening</h2>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: start;">
        <!-- Add Account Form -->
        <div class="card">
          <h3 class="card-title">Tambah Rekening Baru</h3>
          <form id="envelope-form">
            <div class="form-group">
              <label for="envelope-bank" class="form-label">Nama Bank / E-Wallet</label>
              <input type="text" id="envelope-bank" class="form-control" placeholder="BCA / Mandiri / GoPay" required maxlength="100">
            </div>
            <div class="form-group">
              <label for="envelope-holder" class="form-label">Nama Pemilik Rekening</label>
              <input type="text" id="envelope-holder" class="form-control" placeholder="Nama lengkap pemilik" required maxlength="50">
            </div>
            <div class="form-group">
              <label for="envelope-number" class="form-label">Nomor Rekening / Akun</label>
              <input type="text" id="envelope-number" class="form-control" placeholder="Nomor rekening / No HP e-wallet" required maxlength="50">
            </div>
            <div class="form-group">
              <label for="envelope-sort-order" class="form-label">Urutan Tampil</label>
              <input type="number" id="envelope-sort-order" class="form-control" value="0" min="0">
            </div>
            <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 10px;">
              <i data-feather="plus"></i> Tambah Rekening
            </button>
          </form>
        </div>

        <!-- Accounts List Table -->
        <div class="card">
          <h3 class="card-title">Rekening Terdaftar</h3>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Bank / E-Wallet</th>
                  <th>Nama Pemilik</th>
                  <th>Nomor Rekening</th>
                  <th style="width: 80px;">Aksi</th>
                </tr>
              </thead>
              <tbody id="envelope-items-container">
                <tr>
                  <td colspan="4" style="text-align: center; color: var(--color-neutral-gray); padding: 30px;">
                    Memuat daftar rekening...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
