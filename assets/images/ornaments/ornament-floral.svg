<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" aria-hidden="true" role="img">
  <title>Full Floral Bouquet Ornament</title>
  <defs>
    <radialGradient id="mainFlowerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#A07830"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </radialGradient>
    <radialGradient id="pinkFlowerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="deepLeafGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4A7C59"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </radialGradient>
    <radialGradient id="lightLeafGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#87A878"/>
      <stop offset="100%" stop-color="#4A7C59"/>
    </radialGradient>
    <radialGradient id="goldBudGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#E8C060"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </radialGradient>
  </defs>

  <!-- === BACKGROUND SUBTLE DECORATIVE RING === -->
  <circle cx="150" cy="148" r="120" fill="none" stroke="#C9A84C" stroke-width="0.4" stroke-dasharray="3,6" opacity="0.3"/>
  <circle cx="150" cy="148" r="108" fill="none" stroke="#4A7C59" stroke-width="0.3" stroke-dasharray="2,8" opacity="0.2"/>

  <!-- === STEMS AND MAIN VINES === -->
  <!-- Central main stem -->
  <path d="M 150,285 Q 148,250 150,220 Q 152,190 150,160" 
        stroke="#2D5016" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left main branch -->
  <path d="M 150,220 Q 130,200 110,190 Q 90,180 72,168" 
        stroke="#2D5016" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Left sub-branch upper -->
  <path d="M 110,190 Q 95,175 85,160 Q 78,148 70,138" 
        stroke="#2D5016" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left sub-branch lower -->
  <path d="M 150,235 Q 128,228 112,235 Q 96,242 82,238" 
        stroke="#4A7C59" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Right main branch -->
  <path d="M 150,220 Q 170,200 190,190 Q 210,180 228,168" 
        stroke="#2D5016" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right sub-branch upper -->
  <path d="M 190,190 Q 205,175 215,160 Q 222,148 230,138" 
        stroke="#2D5016" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right sub-branch lower -->
  <path d="M 150,235 Q 172,228 188,235 Q 204,242 218,238" 
        stroke="#4A7C59" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Upper arching branches -->
  <path d="M 150,160 Q 135,140 118,128 Q 102,116 88,105" 
        stroke="#2D5016" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 150,160 Q 165,140 182,128 Q 198,116 212,105" 
        stroke="#2D5016" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 150,160 Q 150,138 150,120 Q 150,105 150,90" 
        stroke="#2D5016" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Tendrils / curling vines -->
  <path d="M 75,168 Q 62,162 55,170 Q 50,178 58,184" stroke="#4A7C59" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 225,168 Q 238,162 245,170 Q 250,178 242,184" stroke="#4A7C59" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 88,105 Q 78,95 80,85 Q 82,75 90,78" stroke="#4A7C59" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 212,105 Q 222,95 220,85 Q 218,75 210,78" stroke="#4A7C59" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- === LARGE LEAVES === -->
  <!-- Lower left leaves -->
  <path d="M 150,240 Q 130,255 118,248 Q 106,240 112,228 Q 120,220 136,228 Q 148,235 150,240 Z" 
        fill="url(#deepLeafGrad)" opacity="0.85"/>
  <line x1="150" y1="240" x2="118" y2="237" stroke="#87A878" stroke-width="0.7" opacity="0.6"/>
  <!-- Leaf vein lines -->
  <path d="M 135,230 Q 128,235 122,238" stroke="#87A878" stroke-width="0.4" fill="none" opacity="0.5"/>
  <path d="M 140,233 Q 133,238 127,240" stroke="#87A878" stroke-width="0.4" fill="none" opacity="0.5"/>

  <!-- Lower right leaves -->
  <path d="M 150,240 Q 170,255 182,248 Q 194,240 188,228 Q 180,220 164,228 Q 152,235 150,240 Z" 
        fill="url(#deepLeafGrad)" opacity="0.85"/>
  <line x1="150" y1="240" x2="182" y2="237" stroke="#87A878" stroke-width="0.7" opacity="0.6"/>
  <path d="M 165,230 Q 172,235 178,238" stroke="#87A878" stroke-width="0.4" fill="none" opacity="0.5"/>
  <path d="M 160,233 Q 167,238 173,240" stroke="#87A878" stroke-width="0.4" fill="none" opacity="0.5"/>

  <!-- Mid left large leaf -->
  <path d="M 110,190 Q 88,196 80,186 Q 72,175 82,168 Q 94,162 106,172 Q 114,182 110,190 Z" 
        fill="url(#lightLeafGrad)" opacity="0.8"/>
  <line x1="110" y1="190" x2="82" y2="177" stroke="#4A7C59" stroke-width="0.8" opacity="0.6"/>

  <!-- Mid right large leaf -->
  <path d="M 190,190 Q 212,196 220,186 Q 228,175 218,168 Q 206,162 194,172 Q 186,182 190,190 Z" 
        fill="url(#lightLeafGrad)" opacity="0.8"/>
  <line x1="190" y1="190" x2="218" y2="177" stroke="#4A7C59" stroke-width="0.8" opacity="0.6"/>

  <!-- Upper left leaves (smaller) -->
  <ellipse cx="75" cy="155" rx="14" ry="6" fill="#2D5016" opacity="0.8" transform="rotate(-40 75 155)"/>
  <line x1="75" y1="155" x2="82" y2="150" stroke="#87A878" stroke-width="0.6" opacity="0.5"/>
  <ellipse cx="88" cy="130" rx="12" ry="5" fill="#4A7C59" opacity="0.8" transform="rotate(-50 88 130)"/>
  <ellipse cx="70" cy="138" rx="10" ry="4" fill="#2D5016" opacity="0.7" transform="rotate(-30 70 138)"/>

  <!-- Upper right leaves (smaller) -->
  <ellipse cx="225" cy="155" rx="14" ry="6" fill="#2D5016" opacity="0.8" transform="rotate(40 225 155)"/>
  <line x1="225" y1="155" x2="218" y2="150" stroke="#87A878" stroke-width="0.6" opacity="0.5"/>
  <ellipse cx="212" cy="130" rx="12" ry="5" fill="#4A7C59" opacity="0.8" transform="rotate(50 212 130)"/>
  <ellipse cx="230" cy="138" rx="10" ry="4" fill="#2D5016" opacity="0.7" transform="rotate(30 230 138)"/>

  <!-- Top leaves -->
  <ellipse cx="135" cy="105" rx="12" ry="5" fill="#2D5016" opacity="0.8" transform="rotate(-60 135 105)"/>
  <ellipse cx="165" cy="105" rx="12" ry="5" fill="#2D5016" opacity="0.8" transform="rotate(60 165 105)"/>
  <ellipse cx="150" cy="108" rx="10" ry="4.5" fill="#4A7C59" opacity="0.75" transform="rotate(0 150 108)"/>

  <!-- === SMALL ACCENT LEAVES (batik-style pointed) === -->
  <g opacity="0.7">
    <path d="M 95,170 Q 90,160 100,155 Q 108,162 95,170 Z" fill="#87A878"/>
    <path d="M 205,170 Q 210,160 200,155 Q 192,162 205,170 Z" fill="#87A878"/>
    <path d="M 130,245 Q 125,255 135,258 Q 140,250 130,245 Z" fill="#4A7C59"/>
    <path d="M 170,245 Q 175,255 165,258 Q 160,250 170,245 Z" fill="#4A7C59"/>
    <path d="M 115,120 Q 108,112 116,106 Q 122,112 115,120 Z" fill="#87A878"/>
    <path d="M 185,120 Q 192,112 184,106 Q 178,112 185,120 Z" fill="#87A878"/>
  </g>

  <!-- === FLOWERS === -->

  <!-- MAIN CENTER FLOWER (large, 150,148) -->
  <!-- Outer glow -->
  <circle cx="150" cy="148" r="38" fill="#C9A84C" opacity="0.06"/>
  <!-- Outer petals (8) -->
  <ellipse cx="150" cy="148" rx="8" ry="32" fill="#C9A84C" opacity="0.5" transform="rotate(0 150 148)"/>
  <ellipse cx="150" cy="148" rx="8" ry="32" fill="#C9A84C" opacity="0.5" transform="rotate(45 150 148)"/>
  <ellipse cx="150" cy="148" rx="8" ry="32" fill="#C9A84C" opacity="0.5" transform="rotate(90 150 148)"/>
  <ellipse cx="150" cy="148" rx="8" ry="32" fill="#C9A84C" opacity="0.5" transform="rotate(135 150 148)"/>
  <!-- Inner petals (dark) -->
  <ellipse cx="150" cy="148" rx="5.5" ry="22" fill="#2D5016" opacity="0.75" transform="rotate(22.5 150 148)"/>
  <ellipse cx="150" cy="148" rx="5.5" ry="22" fill="#2D5016" opacity="0.75" transform="rotate(67.5 150 148)"/>
  <ellipse cx="150" cy="148" rx="5.5" ry="22" fill="#2D5016" opacity="0.75" transform="rotate(112.5 150 148)"/>
  <ellipse cx="150" cy="148" rx="5.5" ry="22" fill="#2D5016" opacity="0.75" transform="rotate(157.5 150 148)"/>
  <!-- Ring petals (medium green) -->
  <ellipse cx="150" cy="148" rx="4" ry="15" fill="#4A7C59" opacity="0.85" transform="rotate(0 150 148)"/>
  <ellipse cx="150" cy="148" rx="4" ry="15" fill="#4A7C59" opacity="0.85" transform="rotate(45 150 148)"/>
  <ellipse cx="150" cy="148" rx="4" ry="15" fill="#4A7C59" opacity="0.85" transform="rotate(90 150 148)"/>
  <ellipse cx="150" cy="148" rx="4" ry="15" fill="#4A7C59" opacity="0.85" transform="rotate(135 150 148)"/>
  <!-- Batik geometric ring -->
  <circle cx="150" cy="148" r="14" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <!-- Center disc -->
  <circle cx="150" cy="148" r="12" fill="url(#mainFlowerGrad)"/>
  <circle cx="150" cy="148" r="8" fill="#2D5016"/>
  <circle cx="150" cy="148" r="4.5" fill="#C9A84C"/>
  <circle cx="150" cy="148" r="2" fill="#FAF7F0"/>
  <!-- Stamens -->
  <circle cx="146" cy="144" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="154" cy="144" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="150" cy="141" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="146" cy="152" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="154" cy="152" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="150" cy="155" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="143" cy="148" r="1.1" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="157" cy="148" r="1.1" fill="#FAF7F0" opacity="0.9"/>

  <!-- FLOWER 2 — Left mid (72,168) -->
  <ellipse cx="72" cy="168" rx="5.5" ry="18" fill="#C9A84C" opacity="0.55" transform="rotate(0 72 168)"/>
  <ellipse cx="72" cy="168" rx="5.5" ry="18" fill="#C9A84C" opacity="0.55" transform="rotate(60 72 168)"/>
  <ellipse cx="72" cy="168" rx="5.5" ry="18" fill="#C9A84C" opacity="0.55" transform="rotate(120 72 168)"/>
  <ellipse cx="72" cy="168" rx="4" ry="13" fill="#2D5016" opacity="0.7" transform="rotate(30 72 168)"/>
  <ellipse cx="72" cy="168" rx="4" ry="13" fill="#2D5016" opacity="0.7" transform="rotate(90 72 168)"/>
  <ellipse cx="72" cy="168" rx="4" ry="13" fill="#2D5016" opacity="0.7" transform="rotate(150 72 168)"/>
  <circle cx="72" cy="168" r="8" fill="url(#mainFlowerGrad)"/>
  <circle cx="72" cy="168" r="5" fill="#2D5016"/>
  <circle cx="72" cy="168" r="2.5" fill="#C9A84C"/>
  <circle cx="72" cy="168" r="1" fill="#FAF7F0"/>

  <!-- FLOWER 3 — Right mid (228,168) -->
  <ellipse cx="228" cy="168" rx="5.5" ry="18" fill="#C9A84C" opacity="0.55" transform="rotate(0 228 168)"/>
  <ellipse cx="228" cy="168" rx="5.5" ry="18" fill="#C9A84C" opacity="0.55" transform="rotate(60 228 168)"/>
  <ellipse cx="228" cy="168" rx="5.5" ry="18" fill="#C9A84C" opacity="0.55" transform="rotate(120 228 168)"/>
  <ellipse cx="228" cy="168" rx="4" ry="13" fill="#2D5016" opacity="0.7" transform="rotate(30 228 168)"/>
  <ellipse cx="228" cy="168" rx="4" ry="13" fill="#2D5016" opacity="0.7" transform="rotate(90 228 168)"/>
  <ellipse cx="228" cy="168" rx="4" ry="13" fill="#2D5016" opacity="0.7" transform="rotate(150 228 168)"/>
  <circle cx="228" cy="168" r="8" fill="url(#mainFlowerGrad)"/>
  <circle cx="228" cy="168" r="5" fill="#2D5016"/>
  <circle cx="228" cy="168" r="2.5" fill="#C9A84C"/>
  <circle cx="228" cy="168" r="1" fill="#FAF7F0"/>

  <!-- FLOWER 4 — Upper left (88,105) -->
  <ellipse cx="88" cy="105" rx="4.5" ry="15" fill="#C9A84C" opacity="0.6" transform="rotate(0 88 105)"/>
  <ellipse cx="88" cy="105" rx="4.5" ry="15" fill="#C9A84C" opacity="0.6" transform="rotate(60 88 105)"/>
  <ellipse cx="88" cy="105" rx="4.5" ry="15" fill="#C9A84C" opacity="0.6" transform="rotate(120 88 105)"/>
  <ellipse cx="88" cy="105" rx="3" ry="10" fill="#4A7C59" opacity="0.8" transform="rotate(30 88 105)"/>
  <ellipse cx="88" cy="105" rx="3" ry="10" fill="#4A7C59" opacity="0.8" transform="rotate(90 88 105)"/>
  <ellipse cx="88" cy="105" rx="3" ry="10" fill="#4A7C59" opacity="0.8" transform="rotate(150 88 105)"/>
  <circle cx="88" cy="105" r="7" fill="url(#pinkFlowerGrad)"/>
  <circle cx="88" cy="105" r="4.5" fill="#2D5016"/>
  <circle cx="88" cy="105" r="2" fill="#C9A84C"/>

  <!-- FLOWER 5 — Upper right (212,105) -->
  <ellipse cx="212" cy="105" rx="4.5" ry="15" fill="#C9A84C" opacity="0.6" transform="rotate(0 212 105)"/>
  <ellipse cx="212" cy="105" rx="4.5" ry="15" fill="#C9A84C" opacity="0.6" transform="rotate(60 212 105)"/>
  <ellipse cx="212" cy="105" rx="4.5" ry="15" fill="#C9A84C" opacity="0.6" transform="rotate(120 212 105)"/>
  <ellipse cx="212" cy="105" rx="3" ry="10" fill="#4A7C59" opacity="0.8" transform="rotate(30 212 105)"/>
  <ellipse cx="212" cy="105" rx="3" ry="10" fill="#4A7C59" opacity="0.8" transform="rotate(90 212 105)"/>
  <ellipse cx="212" cy="105" rx="3" ry="10" fill="#4A7C59" opacity="0.8" transform="rotate(150 212 105)"/>
  <circle cx="212" cy="105" r="7" fill="url(#pinkFlowerGrad)"/>
  <circle cx="212" cy="105" r="4.5" fill="#2D5016"/>
  <circle cx="212" cy="105" r="2" fill="#C9A84C"/>

  <!-- FLOWER 6 — Top center (150,90) -->
  <ellipse cx="150" cy="90" rx="5" ry="17" fill="#C9A84C" opacity="0.55" transform="rotate(0 150 90)"/>
  <ellipse cx="150" cy="90" rx="5" ry="17" fill="#C9A84C" opacity="0.55" transform="rotate(45 150 90)"/>
  <ellipse cx="150" cy="90" rx="5" ry="17" fill="#C9A84C" opacity="0.55" transform="rotate(90 150 90)"/>
  <ellipse cx="150" cy="90" rx="5" ry="17" fill="#C9A84C" opacity="0.55" transform="rotate(135 150 90)"/>
  <ellipse cx="150" cy="90" rx="3.5" ry="12" fill="#2D5016" opacity="0.7" transform="rotate(22.5 150 90)"/>
  <ellipse cx="150" cy="90" rx="3.5" ry="12" fill="#2D5016" opacity="0.7" transform="rotate(67.5 150 90)"/>
  <ellipse cx="150" cy="90" rx="3.5" ry="12" fill="#2D5016" opacity="0.7" transform="rotate(112.5 150 90)"/>
  <ellipse cx="150" cy="90" rx="3.5" ry="12" fill="#2D5016" opacity="0.7" transform="rotate(157.5 150 90)"/>
  <circle cx="150" cy="90" r="9" fill="url(#mainFlowerGrad)"/>
  <circle cx="150" cy="90" r="6" fill="#2D5016"/>
  <circle cx="150" cy="90" r="3" fill="#C9A84C"/>
  <circle cx="150" cy="90" r="1.2" fill="#FAF7F0"/>

  <!-- === GOLD BUDS (unopened flowers) === -->
  <!-- Left lower bud -->
  <path d="M 82,238 Q 80,228 86,225 Q 92,222 94,230 Q 96,238 88,242 Q 84,242 82,238 Z" 
        fill="url(#goldBudGrad)" opacity="0.85"/>
  <line x1="88" y1="235" x2="88" y2="242" stroke="#2D5016" stroke-width="1" opacity="0.7"/>
  <ellipse cx="84" cy="240" rx="5" ry="2.5" fill="#4A7C59" opacity="0.7" transform="rotate(-20 84 240)"/>
  <ellipse cx="93" cy="240" rx="5" ry="2.5" fill="#4A7C59" opacity="0.7" transform="rotate(20 93 240)"/>

  <!-- Right lower bud -->
  <path d="M 218,238 Q 220,228 214,225 Q 208,222 206,230 Q 204,238 212,242 Q 216,242 218,238 Z" 
        fill="url(#goldBudGrad)" opacity="0.85"/>
  <line x1="212" y1="235" x2="212" y2="242" stroke="#2D5016" stroke-width="1" opacity="0.7"/>
  <ellipse cx="216" cy="240" rx="5" ry="2.5" fill="#4A7C59" opacity="0.7" transform="rotate(20 216 240)"/>
  <ellipse cx="207" cy="240" rx="5" ry="2.5" fill="#4A7C59" opacity="0.7" transform="rotate(-20 207 240)"/>

  <!-- Top left small bud -->
  <path d="M 70,138 Q 68,130 73,127 Q 78,125 80,132 Q 82,139 75,142 Q 71,142 70,138 Z" 
        fill="url(#goldBudGrad)" opacity="0.8"/>
  <ellipse cx="68" cy="140" rx="4" ry="2" fill="#4A7C59" opacity="0.7" transform="rotate(-25 68 140)"/>
  <ellipse cx="76" cy="141" rx="4" ry="2" fill="#4A7C59" opacity="0.7" transform="rotate(15 76 141)"/>

  <!-- Top right small bud -->
  <path d="M 230,138 Q 232,130 227,127 Q 222,125 220,132 Q 218,139 225,142 Q 229,142 230,138 Z" 
        fill="url(#goldBudGrad)" opacity="0.8"/>
  <ellipse cx="232" cy="140" rx="4" ry="2" fill="#4A7C59" opacity="0.7" transform="rotate(25 232 140)"/>
  <ellipse cx="224" cy="141" rx="4" ry="2" fill="#4A7C59" opacity="0.7" transform="rotate(-15 224 141)"/>

  <!-- === BATIK GEOMETRIC ACCENTS === -->
  <!-- Diamond dots scattered -->
  <g fill="#C9A84C" opacity="0.45">
    <rect x="146" y="266" width="8" height="8" transform="rotate(45 150 270)"/>
    <rect x="146" y="24" width="6" height="6" transform="rotate(45 149 27)"/>
    <rect x="53" y="126" width="6" height="6" transform="rotate(45 56 129)"/>
    <rect x="240" y="126" width="6" height="6" transform="rotate(45 243 129)"/>
    <rect x="100" y="60" width="5" height="5" transform="rotate(45 102 62)"/>
    <rect x="193" y="60" width="5" height="5" transform="rotate(45 195 62)"/>
  </g>

  <!-- Batik dot clusters -->
  <g fill="#C9A84C" opacity="0.35">
    <circle cx="58" cy="195" r="2"/>
    <circle cx="64" cy="200" r="1.5"/>
    <circle cx="52" cy="200" r="1.5"/>
    <circle cx="242" cy="195" r="2"/>
    <circle cx="248" cy="200" r="1.5"/>
    <circle cx="236" cy="200" r="1.5"/>
  </g>

  <!-- === SCROLLWORK FLOURISHES === -->
  <!-- Bottom center scroll -->
  <path d="M 130,278 Q 140,270 150,275 Q 160,270 170,278" 
        stroke="#C9A84C" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <circle cx="150" cy="285" r="2.5" fill="#C9A84C" opacity="0.5"/>
  <circle cx="130" cy="280" r="1.5" fill="#C9A84C" opacity="0.4"/>
  <circle cx="170" cy="280" r="1.5" fill="#C9A84C" opacity="0.4"/>

  <!-- Left scrollwork -->
  <path d="M 48,175 Q 40,168 44,160 Q 48,153 55,158" 
        stroke="#C9A84C" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Right scrollwork -->
  <path d="M 252,175 Q 260,168 256,160 Q 252,153 245,158" 
        stroke="#C9A84C" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Top arch flourish -->
  <path d="M 118,72 Q 134,62 150,68 Q 166,62 182,72" 
        stroke="#C9A84C" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.55"/>
</svg>
