<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60" aria-hidden="true" role="img">
  <title>Horizontal Floral Divider Ornament</title>
  <defs>
    <radialGradient id="centerFlowerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="60%" stop-color="#A07830"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </radialGradient>
    <radialGradient id="smallFlowerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="lineGradLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="60%" stop-color="#C9A84C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="lineGradRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#C9A84C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === LEFT SIDE === -->
  <!-- Main horizontal line left -->
  <line x1="0" y1="30" x2="168" y2="30" stroke="url(#lineGradLeft)" stroke-width="1.2"/>
  <!-- Decorative double line -->
  <line x1="20" y1="27" x2="155" y2="27" stroke="url(#lineGradLeft)" stroke-width="0.5" opacity="0.6"/>
  <line x1="20" y1="33" x2="155" y2="33" stroke="url(#lineGradLeft)" stroke-width="0.5" opacity="0.6"/>

  <!-- Left vine with leaves -->
  <path d="M 40,30 Q 55,22 65,28 Q 75,34 85,26 Q 95,18 108,25 Q 118,30 128,24 Q 138,18 148,26" 
        stroke="#4A7C59" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Left side leaves -->
  <ellipse cx="52" cy="22" rx="8" ry="3.5" fill="#2D5016" opacity="0.75" transform="rotate(-25 52 22)"/>
  <ellipse cx="52" cy="22" rx="4" ry="1.5" fill="#87A878" opacity="0.6" transform="rotate(-25 52 22)"/>

  <ellipse cx="78" cy="34" rx="7" ry="3" fill="#4A7C59" opacity="0.8" transform="rotate(20 78 34)"/>
  <ellipse cx="78" cy="34" rx="3.5" ry="1.2" fill="#87A878" opacity="0.5" transform="rotate(20 78 34)"/>

  <ellipse cx="105" cy="22" rx="8" ry="3.5" fill="#2D5016" opacity="0.75" transform="rotate(-20 105 22)"/>
  <ellipse cx="105" cy="22" rx="4" ry="1.5" fill="#87A878" opacity="0.5" transform="rotate(-20 105 22)"/>

  <ellipse cx="130" cy="35" rx="7" ry="3" fill="#4A7C59" opacity="0.75" transform="rotate(15 130 35)"/>

  <!-- Left small flowers -->
  <!-- Small flower at x=65 -->
  <ellipse cx="65" cy="28" rx="4" ry="7" fill="#C9A84C" opacity="0.6" transform="rotate(0 65 28)"/>
  <ellipse cx="65" cy="28" rx="4" ry="7" fill="#C9A84C" opacity="0.6" transform="rotate(60 65 28)"/>
  <ellipse cx="65" cy="28" rx="4" ry="7" fill="#C9A84C" opacity="0.6" transform="rotate(120 65 28)"/>
  <circle cx="65" cy="28" r="3.5" fill="#2D5016"/>
  <circle cx="65" cy="28" r="1.8" fill="#C9A84C"/>

  <!-- Small flower at x=108 -->
  <ellipse cx="108" cy="25" rx="3.5" ry="6.5" fill="#C9A84C" opacity="0.65" transform="rotate(0 108 25)"/>
  <ellipse cx="108" cy="25" rx="3.5" ry="6.5" fill="#C9A84C" opacity="0.65" transform="rotate(60 108 25)"/>
  <ellipse cx="108" cy="25" rx="3.5" ry="6.5" fill="#C9A84C" opacity="0.65" transform="rotate(120 108 25)"/>
  <circle cx="108" cy="25" r="3" fill="#2D5016"/>
  <circle cx="108" cy="25" r="1.5" fill="#C9A84C"/>

  <!-- Left diamond accents on line -->
  <g fill="#C9A84C">
    <rect x="26" y="28" width="4" height="4" transform="rotate(45 28 30)"/>
    <rect x="148" y="28" width="4" height="4" transform="rotate(45 150 30)"/>
  </g>

  <!-- === RIGHT SIDE === -->
  <!-- Main horizontal line right -->
  <line x1="232" y1="30" x2="400" y2="30" stroke="url(#lineGradRight)" stroke-width="1.2"/>
  <!-- Decorative double line -->
  <line x1="245" y1="27" x2="380" y2="27" stroke="url(#lineGradRight)" stroke-width="0.5" opacity="0.6"/>
  <line x1="245" y1="33" x2="380" y2="33" stroke="url(#lineGradRight)" stroke-width="0.5" opacity="0.6"/>

  <!-- Right vine with leaves (mirrored) -->
  <path d="M 360,30 Q 345,22 335,28 Q 325,34 315,26 Q 305,18 292,25 Q 282,30 272,24 Q 262,18 252,26" 
        stroke="#4A7C59" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Right side leaves -->
  <ellipse cx="348" cy="22" rx="8" ry="3.5" fill="#2D5016" opacity="0.75" transform="rotate(25 348 22)"/>
  <ellipse cx="348" cy="22" rx="4" ry="1.5" fill="#87A878" opacity="0.6" transform="rotate(25 348 22)"/>

  <ellipse cx="322" cy="34" rx="7" ry="3" fill="#4A7C59" opacity="0.8" transform="rotate(-20 322 34)"/>
  <ellipse cx="322" cy="34" rx="3.5" ry="1.2" fill="#87A878" opacity="0.5" transform="rotate(-20 322 34)"/>

  <ellipse cx="295" cy="22" rx="8" ry="3.5" fill="#2D5016" opacity="0.75" transform="rotate(20 295 22)"/>
  <ellipse cx="295" cy="22" rx="4" ry="1.5" fill="#87A878" opacity="0.5" transform="rotate(20 295 22)"/>

  <ellipse cx="270" cy="35" rx="7" ry="3" fill="#4A7C59" opacity="0.75" transform="rotate(-15 270 35)"/>

  <!-- Right small flowers -->
  <!-- Small flower at x=335 -->
  <ellipse cx="335" cy="28" rx="4" ry="7" fill="#C9A84C" opacity="0.6" transform="rotate(0 335 28)"/>
  <ellipse cx="335" cy="28" rx="4" ry="7" fill="#C9A84C" opacity="0.6" transform="rotate(60 335 28)"/>
  <ellipse cx="335" cy="28" rx="4" ry="7" fill="#C9A84C" opacity="0.6" transform="rotate(120 335 28)"/>
  <circle cx="335" cy="28" r="3.5" fill="#2D5016"/>
  <circle cx="335" cy="28" r="1.8" fill="#C9A84C"/>

  <!-- Small flower at x=292 -->
  <ellipse cx="292" cy="25" rx="3.5" ry="6.5" fill="#C9A84C" opacity="0.65" transform="rotate(0 292 25)"/>
  <ellipse cx="292" cy="25" rx="3.5" ry="6.5" fill="#C9A84C" opacity="0.65" transform="rotate(60 292 25)"/>
  <ellipse cx="292" cy="25" rx="3.5" ry="6.5" fill="#C9A84C" opacity="0.65" transform="rotate(120 292 25)"/>
  <circle cx="292" cy="25" r="3" fill="#2D5016"/>
  <circle cx="292" cy="25" r="1.5" fill="#C9A84C"/>

  <!-- Right diamond accents on line -->
  <g fill="#C9A84C">
    <rect x="246" y="28" width="4" height="4" transform="rotate(45 248 30)"/>
    <rect x="368" y="28" width="4" height="4" transform="rotate(45 370 30)"/>
  </g>

  <!-- === CENTER FOCAL FLOWER === -->
  <!-- Outer glow ring -->
  <circle cx="200" cy="30" r="26" fill="#C9A84C" opacity="0.08"/>
  <circle cx="200" cy="30" r="22" fill="#C9A84C" opacity="0.1"/>

  <!-- Outer batik ring petals (8-fold) -->
  <ellipse cx="200" cy="30" rx="6" ry="20" fill="#C9A84C" opacity="0.45" transform="rotate(0 200 30)"/>
  <ellipse cx="200" cy="30" rx="6" ry="20" fill="#C9A84C" opacity="0.45" transform="rotate(45 200 30)"/>
  <ellipse cx="200" cy="30" rx="6" ry="20" fill="#C9A84C" opacity="0.45" transform="rotate(90 200 30)"/>
  <ellipse cx="200" cy="30" rx="6" ry="20" fill="#C9A84C" opacity="0.45" transform="rotate(135 200 30)"/>

  <!-- Mid petals (dark green) -->
  <ellipse cx="200" cy="30" rx="4.5" ry="15" fill="#2D5016" opacity="0.7" transform="rotate(22.5 200 30)"/>
  <ellipse cx="200" cy="30" rx="4.5" ry="15" fill="#2D5016" opacity="0.7" transform="rotate(67.5 200 30)"/>
  <ellipse cx="200" cy="30" rx="4.5" ry="15" fill="#2D5016" opacity="0.7" transform="rotate(112.5 200 30)"/>
  <ellipse cx="200" cy="30" rx="4.5" ry="15" fill="#2D5016" opacity="0.7" transform="rotate(157.5 200 30)"/>

  <!-- Inner petal ring (medium green) -->
  <ellipse cx="200" cy="30" rx="3" ry="10" fill="#4A7C59" opacity="0.85" transform="rotate(0 200 30)"/>
  <ellipse cx="200" cy="30" rx="3" ry="10" fill="#4A7C59" opacity="0.85" transform="rotate(45 200 30)"/>
  <ellipse cx="200" cy="30" rx="3" ry="10" fill="#4A7C59" opacity="0.85" transform="rotate(90 200 30)"/>
  <ellipse cx="200" cy="30" rx="3" ry="10" fill="#4A7C59" opacity="0.85" transform="rotate(135 200 30)"/>

  <!-- Center disc -->
  <circle cx="200" cy="30" r="8" fill="url(#centerFlowerGrad)"/>
  <circle cx="200" cy="30" r="5" fill="#2D5016"/>
  <circle cx="200" cy="30" r="2.8" fill="#C9A84C"/>
  <circle cx="200" cy="30" r="1.2" fill="#FAF7F0"/>

  <!-- Stamen dots -->
  <circle cx="197" cy="27" r="0.9" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="203" cy="27" r="0.9" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="200" cy="25" r="0.9" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="197" cy="33" r="0.9" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="203" cy="33" r="0.9" fill="#FAF7F0" opacity="0.9"/>
  <circle cx="200" cy="35" r="0.9" fill="#FAF7F0" opacity="0.9"/>

  <!-- Side buds flanking center -->
  <!-- Left bud -->
  <ellipse cx="175" cy="30" rx="3" ry="5.5" fill="#C9A84C" opacity="0.7" transform="rotate(0 175 30)"/>
  <ellipse cx="175" cy="30" rx="3" ry="5.5" fill="#C9A84C" opacity="0.7" transform="rotate(60 175 30)"/>
  <ellipse cx="175" cy="30" rx="3" ry="5.5" fill="#C9A84C" opacity="0.7" transform="rotate(120 175 30)"/>
  <circle cx="175" cy="30" r="3" fill="#2D5016"/>
  <circle cx="175" cy="30" r="1.4" fill="#C9A84C"/>

  <!-- Right bud -->
  <ellipse cx="225" cy="30" rx="3" ry="5.5" fill="#C9A84C" opacity="0.7" transform="rotate(0 225 30)"/>
  <ellipse cx="225" cy="30" rx="3" ry="5.5" fill="#C9A84C" opacity="0.7" transform="rotate(60 225 30)"/>
  <ellipse cx="225" cy="30" rx="3" ry="5.5" fill="#C9A84C" opacity="0.7" transform="rotate(120 225 30)"/>
  <circle cx="225" cy="30" r="3" fill="#2D5016"/>
  <circle cx="225" cy="30" r="1.4" fill="#C9A84C"/>

  <!-- Connecting leaves to center flower -->
  <ellipse cx="187" cy="22" rx="6" ry="2.5" fill="#2D5016" opacity="0.7" transform="rotate(-35 187 22)"/>
  <ellipse cx="213" cy="22" rx="6" ry="2.5" fill="#2D5016" opacity="0.7" transform="rotate(35 213 22)"/>
  <ellipse cx="187" cy="38" rx="6" ry="2.5" fill="#4A7C59" opacity="0.7" transform="rotate(35 187 38)"/>
  <ellipse cx="213" cy="38" rx="6" ry="2.5" fill="#4A7C59" opacity="0.7" transform="rotate(-35 213 38)"/>
</svg>
